name: ul-transxnet
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy=2.0.2
  - pandas=2.3.3
  - scipy=1.13.1
  - scikit-learn=1.6.1
  - matplotlib=3.9.4
  - pillow=11.3.0
  - opencv
  - pyyaml
  - tqdm
  - pip:
      - torch==2.7.1
      - torchvision==0.22.1
      - timm==1.0.25
      - mmcv==2.2.0
      - ultralytics==8.4.46
      - thop
      - seaborn
notes:
  - The local development environment used torch==2.7.1+cu118 and torchvision==0.22.1+cu118.
  - Install the CUDA-specific PyTorch build appropriate for your machine if the generic pip wheels are not suitable.
  - Full training also requires the original datasets described in DATA.md.
