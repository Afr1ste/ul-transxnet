dataset: AUL
protocol: binary ROI classification, five folds
local_paths:
  data_root: ${AUL_ROI_ROOT}
  output_root: ${AUL_OUTPUT_ROOT:-aul_roi_runs}
model:
  name: UL-TransXNet
  module: src.models.transxnetggg
  function: transxnet_t
  input_size: 256
training:
  folds: [0, 1, 2, 3, 4]
  num_epochs: 20
  early_stop_patience: 4
  head_lr: 0.00003
  backbone_lr: 0.00001
  weight_decay: 0.0001
  label_smoothing: 0.0
  lr_schedule: cosine_floor
  lr_warmup_epochs: 2
  lr_min_ratio: 0.4
roi:
  source: annotation-derived VOC box or generated ROI metadata
  bbox_expand: 0.2
  square_crop: true
evaluation:
  validation_threshold_mode: balanced_accuracy
  temperature_scaling: true
  checkpoint_ensemble_top_k: 2
  primary_metric: auc
