manuscript_revision: "2026-05-05 no-retrain revision"
input:
  tensor_size: [3, 256, 256]
  roi_protocol: "expanded rectangular ROI, aspect ratio preserved before resize"
  expansion_ratio:
    TN5000: 0.30
    BUSI: 0.30
    AUL: 0.20
  normalization: "ImageNet normalization at evaluation"
datasets:
  TN5000:
    task: "benign-malignant thyroid nodule classification"
    split: "official train/val/test = 3500/500/1000"
    reporting_units: "3 random seeds"
  BUSI:
    task: "benign-malignant breast ultrasound lesion classification"
    split: "fixed held-out test set; five training folds on trainval"
    reporting_units: "5 training folds evaluated on fixed test"
  AUL:
    task: "benign-malignant liver ultrasound lesion classification"
    split: "fixed held-out test set; five training folds on trainval"
    reporting_units: "5 training folds evaluated on fixed test"
model_selection:
  rule: "highest mean validation AUC across TN5000, BUSI, and AUL"
  selected: "UL-TransXNet"
  source: "MODEL_SELECTION_PROTOCOL.md"
artifact_boundary:
  included: "source code, paper source/PDF, compact summaries, prediction CSVs, validation thresholds, fitted temperatures, provenance"
  excluded: "dataset images, ROI image folders, checkpoints, detector weights, ONNX binaries, APKs, raw logs"
