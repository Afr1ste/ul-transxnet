dataset: TN5000
protocol: ROI classification, three random seeds
local_paths:
  tn5000_root: ${TN5000_ROOT}
  output_root: ${TN5000_OUTPUT_ROOT:-tn5000_roi_runs}
model:
  name: UL-TransXNet
  module: src.models.transxnetggg
  function: transxnet_t
  input_size: 256
training:
  seeds: [17, 27, 37]
  num_epochs: 70
  early_stop_patience: 12
  head_lr: 0.00015
  backbone_lr: 0.00005
  weight_decay: 0.0001
  label_smoothing: 0.0
  lr_schedule: cosine_floor
  lr_warmup_epochs: 5
  lr_min_ratio: 0.25
roi:
  source: annotation-derived lesion box
  bbox_expand: 0.3
  square_crop: true
evaluation:
  validation_threshold_mode: balanced_accuracy
  temperature_scaling: true
  checkpoint_ensemble_top_k: 3
  primary_metric: auc
