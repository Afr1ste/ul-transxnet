protocol: automatic ROI closed-loop experiment
purpose: Evaluate whether a detector-predicted lesion box can replace annotation-derived ROI input in the full inference chain.
datasets:
  - BUSI
  - AUL
  - TN5000 auxiliary detector experiment
detector:
  family: Ultralytics YOLO one-class lesion detector
  folds: 5 for BUSI/AUL; 3 seeds for TN5000 auxiliary experiment
  output: predicted lesion box
roi_conversion:
  square_crop: true
  expansion:
    TN5000: 0.3
    BUSI: 0.3
    AUL: 0.2
classifier:
  name: UL-TransXNet
  input_size: 256
metrics:
  detector:
    - mean_iou
    - recall_at_0.50
    - recall_at_0.75
    - no_detection_rate
  closed_loop:
    - accuracy
    - balanced_accuracy
    - macro_f1
    - auc
figures:
  workflow: paper/figures/fig_auto_roi_workflow.pdf
